name: Build and Upload to TestApp.io

on:
  push:
    branches:
      - main

jobs:
  build:
    runs-on: macos-14

    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Set up Ruby
        uses: ruby/setup-ruby@v1
        with:
          ruby-version: 3.2

      - name: Install Bundler
        run: gem install bundler

      - name: Install dependencies
        run: bundle install

      - name: Setup match credentials
        env:
          MATCH_PASSWORD: ${{ secrets.MATCH_PASSWORD }}
          MATCH_GIT_URL: ${{ secrets.MATCH_GIT_URL }}
        run: echo "Match credentials set"

      - name: Run Fastlane beta
        env:
  MATCH_GIT_URL: ${{ secrets.MATCH_GIT_URL }}
  MATCH_GIT_AUTHORIZATION: ${{ secrets.MATCH_GIT_PRIVATE_TOKEN }}
  APP_SCHEME: TestCiApp
  TESTAPPIO_API_TOKEN: ${{ secrets.TESTAPPIO_API_TOKEN }}
  TESTAPPIO_APP_ID: ${{ secrets.TESTAPPIO_APP_ID }}
        run: bundle exec fastlane beta

