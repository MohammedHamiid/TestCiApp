name: iOS Build and Upload to TestApp.io

on:
  push:
    branches:
      - main

jobs:
  build:
    runs-on: macos-latest

    steps:
    - name: Checkout repo
      uses: actions/checkout@v3

    - name: Set up Ruby
      uses: ruby/setup-ruby@v1
      with:
        ruby-version: 3.2

    - name: Install dependencies
      run: |
        gem install bundler
        bundle install

    - name: Decode and write Apple AuthKey
      run: |
        echo "${{ secrets.APP_STORE_CONNECT_API_KEY_CONTENT }}" | base64 --decode > AuthKey.p8

    - name: Run fastlane beta lane
      env:
        APP_STORE_KEY_ID: ${{ secrets.APP_STORE_KEY_ID }}
        APP_STORE_ISSUER_ID: ${{ secrets.APP_STORE_ISSUER_ID }}
        APP_STORE_AUTH_KEY_PATH: ./AuthKey.p8
        TESTAPPIO_API_TOKEN: ${{ secrets.TESTAPPIO_API_TOKEN }}
        TESTAPPIO_APP_ID: ${{ secrets.TESTAPPIO_APP_ID }}
        APP_SCHEME: TestCiApp
      run: |
        bundle exec fastlane beta

